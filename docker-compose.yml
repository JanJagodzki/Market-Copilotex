services:
  postgres:
    image: postgres:16
    container_name: marketcopilotex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketcopilotex
      POSTGRES_USER: marketcopilotex_user
      POSTGRES_PASSWORD: marketcopilotex_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
